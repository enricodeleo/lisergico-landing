<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#bf00ff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ff00ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00ffff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background circle -->
  <circle cx="50" cy="50" r="48" fill="#0a001a"/>

  <!-- Morphing blob shape -->
  <path d="M50 10
           Q70 10 80 30
           Q95 45 85 60
           Q80 80 60 85
           Q40 95 25 80
           Q10 65 15 45
           Q20 20 50 10Z"
        fill="url(#grad1)"
        filter="url(#glow)"/>

  <!-- Eye symbol -->
  <ellipse cx="50" cy="50" rx="15" ry="20" fill="#0a001a" opacity="0.8"/>
  <circle cx="50" cy="50" r="8" fill="#39ff14" filter="url(#glow)"/>
  <circle cx="53" cy="47" r="3" fill="#fff" opacity="0.6"/>
</svg>
